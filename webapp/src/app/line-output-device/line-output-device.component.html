<div class="card">
  <div class="card-header">
    <button class="btn btn-sm btn-primary" title="Save device data" (click)="downloadFile()">
      <fa-icon [icon]="faDownload"></fa-icon></button>
    </div>
    <div class="card-body">
      @for (line of lines; track line) {
        <div class="line">{{line}}</div>
      }
    </div>
  </div>
